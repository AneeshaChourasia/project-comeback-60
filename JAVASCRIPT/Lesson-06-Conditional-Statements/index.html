<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>JavaScript Lesson 06 - Conditional Statements</title>

  <body>
    <h1>JavaScript Lesson 06</h1>

    <h2>Topic: Conditional Statements</h2>

    <hr />

    <table border="1">
      <tr>
        <th>Statement</th>
        <th>Description</th>
      </tr>

      <tr>
        <td>if</td>
        <td>Executes code only if the condition is true.</td>
      </tr>

      <tr>
        <td>if...else</td>
        <td>Executes one block if true and another block if false.</td>
      </tr>

      <tr>
        <td>else if</td>
        <td>Checks multiple conditions.</td>
      </tr>
    </table>

    <p>Open the browser console to view the JavaScript output.</p>

  </body>
